site_name: CleanOps Documentatie
site_description: Officiële handleiding voor CleanOps
site_author: Dominique
site_url: https://docs.cleanops.eu/
copyright: >
  CleanOps &copy; 2026 — eigendom van
  <a href="https://www.adm-concept.be" target="_blank" rel="noopener">ADM-Concept</a>.
  Alle rechten voorbehouden.

theme:
  name: material
  language: nl
  logo: images/logo.svg
  favicon: images/logo.svg
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Schakel naar donkere modus
    - scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Schakel naar lichte modus
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html

plugins:
  - search:
      lang:
        - nl
        - fr
  - i18n:
      docs_structure: suffix
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: nl
          default: true
          name: Nederlands
          build: true
          site_name: CleanOps Documentatie
          site_description: Officiële handleiding voor CleanOps
        - locale: fr
          name: Français
          build: true
          site_name: CleanOps Documentation
          site_description: Manuel officiel de CleanOps
          copyright: >
            CleanOps &copy; 2026 — propriété d'<a href="https://www.adm-concept.be" target="_blank" rel="noopener">ADM-Concept</a>.
            Tous droits réservés.
          theme:
            language: fr
            palette:
              - scheme: default
                primary: teal
                accent: teal
                toggle:
                  icon: material/brightness-7
                  name: Passer en mode sombre
              - scheme: slate
                primary: teal
                accent: teal
                toggle:
                  icon: material/brightness-4
                  name: Passer en mode clair
          nav_translations:
            Home: Accueil
            Aan de slag: Premiers pas
            Installatie: Installation
            Eerste aanmelding: Première connexion
            Interface-overzicht: Aperçu de l'interface
            Dashboard: Tableau de bord
            Werkzaamheden: Opérations
            Overzicht: Aperçu
            Contracten: Contrats
            Generatie opdrachten: Génération des ordres
            Opdrachten: Ordres de travail
            Planning: Planning
            Personeel groeperen: Groupement du personnel
            CRM: CRM
            Klanten: Clients
            Leveranciers: Fournisseurs
            Medewerkers: Collaborateurs
            Overzicht verloven: Aperçu des congés
            Verlofsaldi: Soldes de congés
            Attesten: Attestations
            Producten: Produits
            Verwerkingen: Traitements
            Verwerkingsbedrijven: Entreprises de traitement
            Raadplegen en bewerken: Consulter et modifier
            Facturatie: Facturation
            Offertebeheer: Gestion des devis
            Overzicht te factureren: Aperçu à facturer
            Aanmaken facturen: Création des factures
            Factureren werkorders: Facturer les bons de travail
            Afdruk facturen: Impression des factures
            Rappelbeheer: Gestion des rappels
            Openstaande posten: Postes ouverts
            "Op te volgen memo's": "Mémos à suivre"
            Schuldbemiddelingen: Médiation de dettes
            Documentnummers: Numéros de documents
            Boekhouding: Comptabilité
            Boekjaren: Exercices comptables
            Dagboeken: Journaux
            Type documenten: Types de documents
            Bankverrichtingen: Opérations bancaires
            Ingave betalingen: Saisie des paiements
            Rekeningsplan: Plan comptable
            Controle klantenbalans: Contrôle balance clients
            Correctieroutine: Routine de correction
            Aankoopdocumenten: Documents d'achat
            Ingave: Saisie
            Betalingsvoorstel: Proposition de paiement
            Beheer: Configuration
            Bedrijfsprofiel: Profil d'entreprise
            Betalingsvoorwaarden: Conditions de paiement
            Btw-codes: Codes TVA
            Eenheden: Unités
            Facturatiecodes: Codes de facturation
            Landcodes: Codes pays
            Postcodes: Codes postaux
            Taalcodes: Codes langue
            Munt en wisselkoers: Devise et taux de change
            Mail accounts: Comptes mail
            Mail templates: Modèles de mail
            Gebruikers: Utilisateurs
            Registratie Peppol: Enregistrement Peppol
