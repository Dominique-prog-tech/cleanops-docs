site_name: CleanOps Documentatie
site_description: Officiële handleiding voor CleanOps
site_author: Dominique
site_url: https://docs.cleanops.eu/
copyright: >
  CleanOps &copy; 2026 — eigendom van
  <a href="https://www.adm-concept.be" target="_blank" rel="noopener">ADM-Concept</a>.
  Alle rechten voorbehouden.

theme:
  name: material
  language: nl
  logo: images/logo.svg
  favicon: images/logo.svg
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Schakel naar donkere modus
    - scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Schakel naar lichte modus
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html

extra:
  generator: false

